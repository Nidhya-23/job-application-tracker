<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="application.css" />
  </head>
  <body>
    <div class="container">
      <h1>Job Application Tracker</h1>
      

      <div class="form-box">
        <h2>Add New Application</h2>

        <input
          type="text"
          id="company"
          placeholder="Company Name"
          list="company-list"
        />

        <datalist id="company-list">
          <option value="Google"></option>
          <option value="Amazon"></option>
          <option value="Microsoft"></option>
          <option value="Apple"></option>
          <option value="Meta"></option>
          <option value="Netflix"></option>
          <option value="Zoho"></option>
          <option value="TCS"></option>
          <option value="Infosys"></option>
          <option value="Wipro"></option>
          <option value="Accenture"></option>
          <option value="Cognizant"></option>
          <option value="HCL"></option>
          <option value="Capgemini"></option>
          <option value="Oracle"></option>
        </datalist>

        <input type="text" id="role" placeholder="Job Role" list="role-list" />

        <datalist id="role-list">
          <option value="Frontend Developer"></option>
          <option value="Backend Developer"></option>
          <option value="Full Stack Developer"></option>
          <option value="Software Engineer"></option>
          <option value="UI/UX Designer"></option>
          <option value="Data Analyst"></option>
          <option value="Data Scientist"></option>
          <option value="Java Developer"></option>
          <option value="Python Developer"></option>
          <option value="DevOps Engineer"></option>
          <option value="QA Engineer"></option>
          <option value="Mobile App Developer"></option>
        </datalist>

        <input
          type="text"
          id="location"
          placeholder="Location"
          list="location-list"
        />

        <datalist id="location-list">
          <option value="Chennai"></option>
          <option value="Bangalore"></option>
          <option value="Hyderabad"></option>
          <option value="Pune"></option>
          <option value="Mumbai"></option>
          <option value="Delhi"></option>
          <option value="Noida"></option>
          <option value="Coimbatore"></option>
          <option value="Madurai"></option>
          <option value="Trichy"></option>
          <option value="Kochi"></option>
          <option value="Remote"></option>
        </datalist>

        <select id="status">
          <option>Applied</option>
          <option>Interview</option>
          <option>Selected</option>
          <option>Rejected</option>
        </select>

        <button onclick="addApplication()">Add Application</button>
      </div>

      <div class="applications-section">
        <div class="header">
          <h2>Applications</h2>
          <span id="count">0 Applications</span>
        </div>

        <input
          type="text"
          id="search"
          placeholder="Search Company..."
          onkeyup="searchApplications()"
        />

        <select id="filter" onchange="filterApplications()">
          <option value="All">All Status</option>
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Selected">Selected</option>
          <option value="Rejected">Rejected</option>
        </select>

        <div id="applications-list"></div>
      </div>
    </div>

    <script src="application.js"></script>
  </body>
</html>
